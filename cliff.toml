# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# Body template: group_by(group) for sections, group_by(message) for dedup.
# Uses pr_title when available; replace_regex links #N (preprocessors only run on message).
body = """
## What's Changed

{%- if version %} in {{ version | trim_start_matches(pat="v") }}{%- else %} (since {{ previous.version | default(value="initial") }}){%- endif -%}
{%- for group, group_commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for msg, dupes in group_commits | group_by(attribute="message") -%}
  {%- set commit = dupes | first -%}
  {%- if commit.remote.pr_title -%}
    {%- set commit_message = commit.remote.pr_title -%}
  {%- else -%}
    {%- set commit_message = commit.message -%}
  {%- endif %}
  * {% if commit.merge_commit %}{% set section = group | striptags | trim %}{% if section != "Merged pull requests" and section != "Dependabot" %}Merged: {% endif %}{% endif %}{{ commit_message | split(pat="\n") | first | trim | replace_regex(from="(^|[^\\[])#([0-9]+)", to=["$1[#$2](", self::remote_url(), "/issues/$2)"] | join(sep="")) }}\
    {%- if commit.remote.username %} by @{{ commit.remote.username }}{% endif -%}
    {%- if commit.remote.pr_number %} in [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}){% endif %}
{%- endfor -%}
{% raw %}
{% endraw -%}
{%- endfor -%}

{%- if github -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  {% raw %}\n{% endraw -%}
  ### New Contributors
{%- endif %}\
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif -%}

{% if version %}
    {% if previous.version %}
      **Full Changelog**: {{ self::remote_url() }}/compare/{{ previous.version }}...{{ version }}
    {% endif %}
{% else -%}
  {% raw %}\n{% endraw %}
{% endif %}

{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}
"""
# Remove leading and trailing whitespaces from the changelog's body.
trim = true
footer = """
<!-- generated by git-cliff -->
"""
[git]
# Parse commits according to the conventional commits specification.
# See https://www.conventionalcommits.org
conventional_commits = true
# Include unconventional commits; do not exclude them.
filter_unconventional = false
# Treat each commit as one; do not split on newlines.
split_commits = false
# Group commits by type. Prefix "<!-- N -->" controls section order (stripped in template).
commit_parsers = [
  # Dependabot first (before generic Merge pull request)
  { message = "^Merge pull request.*dependabot", group = "<!-- 11 -->Dependabot" },
  { message = "^Bump", skip = true },
  # All other GitHub PR merges (section title replaces per-line "Merged:" prefix)
  { message = "^Merge pull request", group = "<!-- 09 -->Merged pull requests" },
  # Non-PR merges (local / upstream sync)
  { message = "^Merge remote-tracking branch", group = "<!-- 10 -->Other" },
  { message = "^Merge branch", group = "<!-- 10 -->Other" },
  # Conventional commits
  { message = "^doc", group = "<!-- 03 -->Documentation" },
  { message = "^refactor", group = "<!-- 04 -->Refactor" },
  { message = "^perf", group = "<!-- 05 -->Performance" },
  { message = "^chore", group = "<!-- 06 -->Chore" },
  { message = "^cosmetic", group = "<!-- 06 -->Chore" },
  { message = "^style", group = "<!-- 07 -->Styling" },
  { message = "^test", group = "<!-- 08 -->Testing" },
  # Legacy fallthrough (use ^fix\\b — bare [Ff]ix matches "Fix" inside "Bug Fixes", etc.)
  { message = "[Cc]rash", group = "<!-- 01 -->Bug Fixes" },
  { message = "(?i)^fix\\b", group = "<!-- 01 -->Bug Fixes" },
  { message = "[Nn]ull", group = "<!-- 01 -->Bug Fixes" },
  { message = "[Ww]orkaround", group = "<!-- 01 -->Bug Fixes" },
  { message = "^[Aa]dd", group = "<!-- 00 -->Features" },
  { message = "^[Rr]emove", group = "<!-- 04 -->Refactor" },
  { message = "(?i)^feat\\b", group = "<!-- 00 -->Features" },
  { message = "^[Ii]mplement", group = "<!-- 00 -->Features" },
  { message = "[Cc]osmetic", group = "<!-- 07 -->Styling" },
  { message = "[Ii]ndent", group = "<!-- 07 -->Styling" },
  { message = "[Ww]hitespace", group = "<!-- 07 -->Styling" },
  { message = "README", group = "<!-- 03 -->Documentation" },
  { message = "\\.md", group = "<!-- 03 -->Documentation" },
  # Put last as a fallthru for "issues" (use \\bissue\\b — [Ii]ssue matches "issue" inside ".../issues/…")
  { message = "(?i)\\bissue\\b", group = "<!-- 01 -->Bug Fixes" },
  # Catchall
  { message = ".*", group = "<!-- 10 -->Other" },
]
# Rewrite commit messages before display: (#123) → link; bare #123 → link (avoids matching inside [...])
# Note: replace strings are not Tera-evaluated; URLs here stay hardcoded. Template uses remote_url().
commit_preprocessors = [
  { pattern = '\\(#([0-9]+)\\)', replace = "([#$1](https://github.com/nyetwurk/ecuxplot/issues/$1))" },
  { pattern = "(^|[^\\[])#([0-9]+)", replace = "$1[#$2](https://github.com/nyetwurk/ecuxplot/issues/$2)" },
]
# Include commits that do not match any commit_parser (they go to "Other").
filter_commits = false
# Order releases topologically instead of chronologically.
topo_order = false
# Order of commits in each group/release within the changelog.
# Allowed values: newest, oldest
sort_commits = "newest"
# Match only stable tags (v1.2.6). RC tags (v1.2.6-rc3) are ignored.
# CI overrides via --tag-pattern:
#   - stable tag (v1.2.6): same pattern (changes since last non-rc)
#   - rc tag (v1.2.6-rc3): '^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$' (changes since last rc or non-rc)
#   - latest: unreleased since any tag (same pattern as rc)
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
